# Proxy Apache: supabase.aamihe.com -> Supabase Kong (porta 8000)

<VirtualHost 37.27.17.25:443>
    ServerName supabase.aamihe.com
    ServerAlias www.supabase.aamihe.com
    SSLEngine on
    SSLCertificateFile /usr/local/directadmin/data/users/admin/domains/aamihe.com.cert.combined
    SSLCertificateKeyFile /usr/local/directadmin/data/users/admin/domains/aamihe.com.key
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "supabase.aamihe.com"
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/
    ErrorLog /var/log/httpd/domains/aamihe.com.supabase.error.log
    CustomLog /var/log/httpd/domains/aamihe.com.supabase.log combined
</VirtualHost>

<VirtualHost 37.27.17.25:80>
    ServerName supabase.aamihe.com
    ServerAlias www.supabase.aamihe.com
    Redirect permanent / https://supabase.aamihe.com/
</VirtualHost>
