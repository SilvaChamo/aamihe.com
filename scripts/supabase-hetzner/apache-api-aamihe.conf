# Proxy Apache: api.aamihe.com -> Supabase Kong (porta 8000)
# Instalar: ver README (secção Apache proxy)

<VirtualHost 37.27.17.25:443>
    ServerName api.aamihe.com
    ServerAlias www.api.aamihe.com
    SSLEngine on
    SSLCertificateFile /usr/local/directadmin/data/users/admin/domains/aamihe.com.cert.combined
    SSLCertificateKeyFile /usr/local/directadmin/data/users/admin/domains/aamihe.com.key
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "api.aamihe.com"
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/
    ErrorLog /var/log/httpd/domains/aamihe.com.api.error.log
    CustomLog /var/log/httpd/domains/aamihe.com.api.log combined
</VirtualHost>

<VirtualHost 37.27.17.25:80>
    ServerName api.aamihe.com
    ServerAlias www.api.aamihe.com
    Redirect permanent / https://api.aamihe.com/
</VirtualHost>
